services:
  # =========================
  # AI SERVICE (Python)
  # =========================
  ai-service:
    build: ./apps/ai-service #  build từ folder ai-service
    ports:
      - '8000:8000' #  mở http://localhost:8000
    env_file:
      - .env # lấy biến môi trường từ file .env
    depends_on:
      - postgres #  chạy DB trước
    volumes:
      - ./apps/ai-service:/app #  mount code vào container để dev dễ dàng (hot reload)

  # =========================
  # DATABASE (Postgres + pgvector)
  # =========================
  postgres:
    image: pgvector/pgvector:pg16 #  DB có vector cho RAG sau này
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: petadvisor
    ports:
      - '5433:5432' #  để bạn connect bằng tool ngoài như pgAdmin hoặc DBeaver (localhost:5433)
    volumes:
      - pgdata:/var/lib/postgresql/data #  giữ data khi restart

  # =========================
  # SQL SERVER (Database)
  # =========================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Admin@12345"
      MSSQL_PID: "Developer"
    ports:
      - '1433:1433' #  để bạn connect bằng SSMS hoặc DBeaver (localhost:1433)
    volumes:
      - sqlserverdata:/var/opt/mssql #  giữ data khi restart

  # =========================
  # API SERVICE (.NET C#)
  # =========================
  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /app/PetAdvisorSystem.WebAPi
    ports:
      - '5000:5000' #  có thể truy cập qua http://localhost:5000
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    volumes:
      - ./apps/api/PetAdvisorSystem:/app #  mount code để enable dotnet watch (hot reload)
    command: dotnet watch run --no-launch-profile

  # =========================
  # WEB FRONTEND (Next.js)
  # =========================
  web:
    image: node:20
    working_dir: /app
    ports:
      - '3000:3000' #  mở http://localhost:3000
    volumes:
      - ./apps/web:/app #  mount code vào container
      - /app/node_modules # tránh mounted đè node_modules
    command: bash -c "npm install && npm run dev"

# =========================
# VOLUMES (lưu DB)
# =========================
volumes:
  pgdata:
  sqlserverdata:
